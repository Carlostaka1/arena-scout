<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Arena | Arena Scout</title>
    <style>
        /* 1. The Background: Blurry Gym Photo */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Arial', sans-serif;
            overflow: hidden; /* Stops scrolling */
            background: #000;
        }

        .bg-image {
            /* REPLACE THIS URL with a high-res photo of Northern Arena/HYROX */
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=2070'); 
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            filter: blur(8px) brightness(50%); /* Makes the chat pop */
            transform: scale(1.1); /* Prevents white edges from blur */
        }

        /* 2. The Messenger Styling */
        df-messenger {
            --df-messenger-button-titlebar-color: #004d99; /* Northern Arena Blue */
            --df-messenger-font-color: #ffffff;
            --df-messenger-chat-background-color: #fafafa;
            --df-messenger-send-icon: #004d99;
            --df-messenger-user-message-background-color: #e6f2ff;
            --df-messenger-input-box-color: #ffffff;
        }

        /* 3. Welcome Text in Center */
        .welcome-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 1;
            width: 80%;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="welcome-container">
        <h1>Northern Arena</h1>
        <p>Your journey starts with a conversation. <br>The Arena Scout is ready to assist.</p>
    </div>

    <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/v2/messenger.js?v=1"></script>
    <df-messenger
        intent="WELCOME"
        chat-title="Arena Scout"
        agent-id="YOUR_AGENT_ID" 
        language-code="en"
        location="YOUR_LOCATION"
        expand="true"> </df-messenger>

    <script>
        // 5. Logic to show "Suggestion Chips" immediately on load
        const dfMessenger = document.querySelector('df-messenger');
        dfMessenger.addEventListener('df-messenger-loaded', () => {
            dfMessenger.renderCustomCard([
                {
                    "type": "suggestion_chips",
                    "suggestions": [
                        {"text": "10 Days for $10 Trial"},
                        {"text": "Student/Senior Rates"},
                        {"text": "See the Facility (Tour)"}
                    ]
                }
            ]);
        });
    </script>

</body>
</html>
