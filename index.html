<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Arena | Arena Scout</title>
    <style>
        body, html {
            height: 100%; margin: 0; padding: 0;
            font-family: 'Google Sans', Arial, sans-serif;
            background: #000; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=2070'); 
            background-position: center; background-size: cover;
            filter: blur(10px) brightness(30%); z-index: -1; transform: scale(1.1);
        }

        .header-container {
            text-align: center; color: white; z-index: 1; margin-bottom: 20px;
        }

        h1 { font-size: 2.8rem; text-transform: uppercase; letter-spacing: 4px; margin: 0; }
        p { opacity: 0.8; font-size: 1.1rem; }

        /* THE PORTAL CONTAINER */
        #chat-card {
            width: 450px;
            height: 550px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            overflow: hidden;
        }

        /* The Custom 'Start' Button */
        #start-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #004d99;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        #start-btn:hover { transform: scale(1.05); }

        df-messenger {
            --df-messenger-chat-window-height: 550px;
            --df-messenger-chat-window-width: 450px;
            display: none; /* Hidden until button click */
        }

        @media screen and (max-width: 600px) {
            #chat-card { width: 90vw; height: 70vh; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="header-container">
        <h1>Northern Arena</h1>
        <p>Your fitness journey starts with a chat.</p>
    </div>

    <div id="chat-card">
        <button id="start-btn" onclick="openScout()">Start Arena Scout</button>
        
        <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
        <df-messenger
          project-id="arena-scout-492406"
          agent-id="26a84805-4e47-4747-b321-abee73640543"
          language-code="en">
          <df-messenger-chat-bubble chat-title="Arena_Scout"></df-messenger-chat-bubble>
        </df-messenger>
    </div>

    <script>
      function openScout() {
          const dfMessenger = document.querySelector('df-messenger');
          const btn = document.getElementById('start-btn');
          
          // Show the messenger and hide the button
          dfMessenger.style.display = 'block';
          btn.style.display = 'none';

          // Force expand now that a user has clicked
          dfMessenger.expand();

          // Load the chips
          dfMessenger.renderCustomCard([{
              "type": "suggestion_chips",
              "suggestions": [
                {"text": "10 Days for $10 Trial"},
                {"text": "Student/Senior Rates"},
                {"text": "Book a Facility Tour"}
              ]
          }]);
      }
    </script>
</body>
</html>
