<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Arena | Arena Scout</title>
    <style>
        body, html {
            height: 100%; margin: 0; padding: 0;
            background: #000; overflow: hidden;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            font-family: 'Google Sans', sans-serif;
        }

        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=2070'); 
            background-position: center; background-size: cover;
            filter: blur(8px) brightness(30%); z-index: -1;
        }

        .header {
            text-align: center; color: white; margin-bottom: 25px; z-index: 1;
        }

        /* THE FIX: We build the box first */
        .scout-portal {
            width: 480px;
            height: 600px;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            overflow: hidden;
            z-index: 2;
            position: relative;
        }

        /* We force the Messenger to fill this box exactly */
        df-messenger {
            display: block;
            width: 100%;
            height: 100%;
            --df-messenger-font-family: 'Google Sans';
            --df-messenger-chat-background-color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="header">
        <h1 style="margin:0; letter-spacing:4px; text-transform:uppercase; font-size: 2.2rem;">Northern Arena</h1>
        <p style="opacity:0.7;">Your 24/7 fitness concierge is ready.</p>
    </div>

    <div class="scout-portal">
        <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
        <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
        
        <df-messenger
          location="us-central1"
          project-id="arena-scout-492406"
          agent-id="26a84805-4e47-4747-b321-abee73640543"
          language-code="en">
          <df-messenger-chat-bubble chat-title="Arena Scout"></df-messenger-chat-bubble>
        </df-messenger>
    </div>

    <script>
      // This forces the modern messenger to open inside our portal
      const dfMessenger = document.querySelector('df-messenger');
      dfMessenger.addEventListener('df-messenger-loaded', () => {
          dfMessenger.expand();
      });
    </script>

</body>
</html>
