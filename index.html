<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Arena | Arena Scout</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">

    <style>
        :root {
            --sand:        #faf6f0;
            --ink:         #1a2331;
            --ink-soft:    rgba(255,255,255,0.85);
            --pool:        #2b8aab;
            --pool-deep:   #1a5d7a;
            --sunset:      #ff7a5c;
            --sunset-soft: #ffb89d;

            /* df-messenger theming — casual & clean */
            --df-messenger-chat-background: #faf6f0;
            --df-messenger-input-background: #ffffff;
            --df-messenger-input-box-background: #ffffff;
            --df-messenger-input-font-color: #1a2331;
            --df-messenger-input-placeholder-font-color: #9aa4b2;
            --df-messenger-titlebar-background: #1a2331;
            --df-messenger-titlebar-font-color: #ffffff;
            --df-messenger-titlebar-font-family: 'Plus Jakarta Sans', sans-serif;
            --df-messenger-message-bot-background: #ffffff;
            --df-messenger-message-bot-font-color: #1a2331;
            --df-messenger-message-user-background: #2b8aab;
            --df-messenger-message-user-font-color: #ffffff;
            --df-messenger-font-color: #1a2331;
            --df-messenger-font-family: 'Plus Jakarta Sans', sans-serif;
            --df-messenger-send-icon-color: #2b8aab;
            --df-messenger-primary-color: #2b8aab;
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--ink);
            background: var(--ink);
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
        }

        /* ── Split background images ─────────────────────────── */
        .bg-img {
            position: fixed;
            inset: 0;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
        }
        .bg-swim {
            background-image: url('https://static.wixstatic.com/media/065451_ceb719761dfc45ee8fb40438f37f2cca~mv2.jpg/v1/fit/w_2400,h_2400,q_90/065451_ceb719761dfc45ee8fb40438f37f2cca~mv2.jpg');
            background-color: #1a5d7a;
            background-position: left center;
            clip-path: polygon(0 0, 62% 0, 38% 100%, 0 100%);
        }
        .bg-gym {
            background-image: url('https://static.wixstatic.com/media/065451_901d76006ab04e0e8e2d91cb8553f0c8~mv2.jpg/v1/fit/w_2400,h_2400,q_90/065451_901d76006ab04e0e8e2d91cb8553f0c8~mv2.jpg');
            background-color: #3a1a14;
            background-position: right center;
            clip-path: polygon(62% 0, 100% 0, 100% 100%, 38% 100%);
        }

        /* Tinted overlays — cool on swim side, warm on gym side */
        .tint {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }
        .tint-swim {
            background: linear-gradient(135deg, rgba(26, 93, 122, 0.7) 0%, rgba(43, 138, 171, 0.45) 100%);
            clip-path: polygon(0 0, 62% 0, 38% 100%, 0 100%);
        }
        .tint-gym {
            background: linear-gradient(135deg, rgba(255, 122, 92, 0.35) 0%, rgba(26, 35, 49, 0.65) 100%);
            clip-path: polygon(62% 0, 100% 0, 100% 100%, 38% 100%);
        }

        /* Soft vignette */
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.4) 100%);
        }

        /* ── Hero copy ────────────────────────────────────────── */
        .hero {
            text-align: center;
            color: var(--sand);
            position: relative;
            z-index: 5;
            margin-bottom: 22px;
            max-width: 540px;
            animation: rise 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes rise {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .hero .wave {
            display: inline-block;
            font-size: 1.6rem;
            animation: wave 2.4s ease-in-out infinite;
            transform-origin: 70% 70%;
        }
        @keyframes wave {
            0%, 60%, 100% { transform: rotate(0deg); }
            10%, 30%      { transform: rotate(18deg); }
            20%           { transform: rotate(-12deg); }
            40%, 50%      { transform: rotate(10deg); }
        }

        .hero h1 {
            font-family: 'Fraunces', serif;
            font-weight: 500;
            font-size: clamp(2rem, 5vw, 3rem);
            line-height: 1.1;
            margin: 8px 0 14px;
            letter-spacing: -0.02em;
            color: #ffffff;
        }
        .hero h1 .accent {
            font-style: italic;
            color: var(--sunset-soft);
            font-weight: 500;
        }

        .hero p {
            font-size: 1.05rem;
            line-height: 1.55;
            margin: 0;
            color: var(--ink-soft);
            font-weight: 400;
        }
        .hero p .pill {
            display: inline-block;
            padding: 2px 10px;
            margin: 0 2px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 999px;
            font-weight: 600;
            font-size: 0.95em;
            color: #ffffff;
        }

        /* ── Chat portal ──────────────────────────────────────── */
        .portal-frame {
            position: relative;
            z-index: 5;
            width: 420px;
            height: 560px;
            max-width: 100%;
            max-height: 68vh;
            border-radius: 20px;
            overflow: hidden;
            background: #faf6f0;
            box-shadow:
                0 30px 70px rgba(0, 0, 0, 0.35),
                0 0 0 1px rgba(255,255,255,0.1);
            animation: rise 1.1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        df-messenger {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            background: transparent !important;
        }
        df-messenger-chat {
            width: 100%;
            height: 100%;
        }

        /* ── Footer note ──────────────────────────────────────── */
        .footer-note {
            margin-top: 18px;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.7);
            position: relative;
            z-index: 5;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-align: center;
        }
        .footer-note .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.6);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.6); }
            70%  { box-shadow: 0 0 0 8px rgba(74, 222, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }

        /* ── Mobile ──────────────────────────────────────────── */
        @media (max-width: 600px) {
            .hero { margin-bottom: 16px; }
            .hero h1 { font-size: 1.8rem; }
            .hero p { font-size: 0.95rem; }
            .portal-frame { height: 540px; max-height: 65vh; }
            /* Stack the split vertically on mobile so both images are visible */
            .bg-swim { clip-path: polygon(0 0, 100% 0, 100% 38%, 0 62%); }
            .bg-gym  { clip-path: polygon(0 62%, 100% 38%, 100% 100%, 0 100%); }
            .tint-swim { clip-path: polygon(0 0, 100% 0, 100% 38%, 0 62%); }
            .tint-gym  { clip-path: polygon(0 62%, 100% 38%, 100% 100%, 0 100%); }
        }
    </style>
</head>
<body>

    <!-- ── Background layers ──────────────────────────────────── -->
    <div class="bg-img bg-swim"></div>
    <div class="bg-img bg-gym"></div>
    <div class="tint tint-swim"></div>
    <div class="tint tint-gym"></div>
    <div class="vignette"></div>

    <!-- ── Hero ───────────────────────────────────────────────── -->
    <div class="hero">
        <span class="wave" aria-hidden="true">👋</span>
        <h1>Hello — got a <span class="accent">question?</span></h1>
        <p>Whether it's about <span class="pill">🏊 swim</span> or <span class="pill">💪 gym</span>, have a chat with Arena Scout below.</p>
    </div>

    <!-- ── Chat portal ────────────────────────────────────────── -->
    <div class="portal-frame">
        <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
        <df-messenger
          location="us-central1"
          project-id="arena-scout-492406"
          agent-id="82b6f6fc-d24e-46bb-a464-70224b797172"
          language-code="en"
          max-query-length="-1"
          allow-unauthenticated="true">
          <df-messenger-chat chat-title="Arena Scout" intent="WELCOME"></df-messenger-chat>
        </df-messenger>
    </div>

    <div class="footer-note">
        <span class="dot"></span>
        Scout is online and ready to help
    </div>

</body>
</html>
