<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Arena | Arena Scout</title>
    <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
    <style>
        body, html {
            height: 100%; margin: 0; padding: 0;
            background: #000; overflow: hidden;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            font-family: 'Google Sans', sans-serif;
        }

        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=2070'); 
            background-position: center; background-size: cover;
            filter: blur(8px) brightness(30%); z-index: -1;
        }

        .header {
            text-align: center; color: white; margin-bottom: 20px; z-index: 1;
        }

        /* This creates the white "Search Bar" look in the center */
        df-messenger {
            z-index: 999;
            position: fixed;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            --df-messenger-chat-window-height: 600px;
            --df-messenger-chat-window-width: 500px;
            --df-messenger-button-titlebar-color: #004d99;
        }

        /* This hides the floating bubble so only the window shows */
        df-messenger::part(button) {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="header">
        <h1 style="margin:0; letter-spacing:3px; text-transform:uppercase;">Northern Arena</h1>
        <p style="opacity:0.7;">The Arena Scout is online and ready.</p>
    </div>

    <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
    <df-messenger
      location="us-central1"
      project-id="arena-scout-492406"
      agent-id="26a84805-4e47-4747-b321-abee73640543"
      language-code="en"
      expand="true"> <df-messenger-chat-bubble
      chat-title="Arena Scout">
      </df-messenger-chat-bubble>
    </df-messenger>

</body>
</html>
