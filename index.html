<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Arena | Arena Scout</title>
    
    <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">

    <style>
        :root {
            --df-messenger-chat-background: #ffffff;
            --df-messenger-chat-bubble-background: #ffffff;
            --df-messenger-input-background: #ffffff;
            --df-messenger-input-box-background: #ffffff;
            --df-messenger-input-font-color: #000000;
            --df-messenger-input-placeholder-font-color: #888888;
            --df-messenger-titlebar-background: rgba(255,255,255,0.08);
            --df-messenger-titlebar-font-color: #ffffff;
            --df-messenger-message-bot-background: #f1f3f4;
            --df-messenger-message-bot-background-color: #f1f3f4;
            --df-messenger-bot-message-background: #f1f3f4;
            --df-messenger-message-bot-font-color: #000000;
            --df-messenger-message-user-background: #d3e3fd;
            --df-messenger-message-user-font-color: #000000;
            --df-messenger-font-color: #000000;
            --df-messenger-element-font-color: #000000;
            --df-messenger-border-color: rgba(255,255,255,0.15);
            --df-messenger-primary-color: #0b57d0;
        }
        body, html {
            height: 100%; margin: 0; padding: 0;
            overflow: hidden;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-family: 'Google Sans', sans-serif;
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=2070');
            background-position: center; background-size: cover;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 0;
        }
        .header {
            text-align: center; color: white; margin-bottom: 25px;
            position: relative; z-index: 1;
        }
        .portal-frame {
            width: 400px; height: 550px;
            max-width: 90%; max-height: 75vh;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            overflow: hidden;
            position: relative; z-index: 1;
        }
        df-messenger {
            width: 100%; height: 100%;
            position: relative; z-index: 1;
            background: transparent !important;
        }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.5rem !important; }
            .portal-frame { height: 500px; width: 95%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="margin:0; letter-spacing:4px; text-transform:uppercase; font-size:2.2rem;">Northern Arena</h1>
        <p style="opacity:0.7;">Arena Scout is Online</p>
    </div>
    <div class="portal-frame">
        <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
        <df-messenger
          location="us-central1"
          project-id="arena-scout-492406"
          agent-id="82b6f6fc-d24e-46bb-a464-70224b797172"
          language-code="en"
          max-query-length="-1"
          allow-unauthenticated="true">
          <df-messenger-chat chat-title="Arena Scout" intent="WELCOME"></df-messenger-chat>
        </df-messenger>
    </div>
</body>
</html>
