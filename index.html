<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Arena | Arena Scout</title>
</head>
<body style="height: 100vh; margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; overflow: hidden;">

    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=2070'); background-position: center; background-size: cover; filter: blur(8px) brightness(30%); z-index: -1;"></div>

    <div style="text-align: center; color: white; margin-bottom: 30px; z-index: 1;">
        <h1 style="font-size: 2.5rem; text-transform: uppercase; letter-spacing: 5px; margin: 0;">Northern Arena</h1>
        <p style="opacity: 0.7; font-size: 1.1rem; margin-top: 10px;">Your AI-Powered Fitness Concierge</p>
    </div>

    <div id="v2-card" style="width: 480px; height: 580px; background: white; border-radius: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2; overflow: hidden;">
        
        <button id="v2-start-btn" onclick="launchAgent()" style="padding: 18px 40px; font-size: 1.1rem; background: #004d99; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 10px 20px rgba(0,77,153,0.3);">
            Launch Arena Scout
        </button>
        
        <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
        <df-messenger
          id="v2-messenger"
          project-id="arena-scout-492406"
          agent-id="26a84805-4e47-4747-b321-abee73640543"
          language-code="en"
          style="display:none;">
          <df-messenger-chat-bubble chat-title="Arena Scout"></df-messenger-chat-bubble>
        </df-messenger>
    </div>

    <script>
      function launchAgent() {
          const messenger = document.getElementById('v2-messenger');
          const btn = document.getElementById('v2-start-btn');
          
          // Style the messenger window size directly
          messenger.style.setProperty('--df-messenger-chat-window-height', '580px');
          messenger.style.setProperty('--df-messenger-chat-window-width', '480px');
          
          messenger.style.display = 'block';
          btn.style.display = 'none';

          setTimeout(() => {
              messenger.expand();
          }, 150);

          messenger.renderCustomCard([{
              "type": "suggestion_chips",
              "suggestions": [
                {"text": "10 Days for $10 Trial"},
                {"text": "Student/Senior Rates"},
                {"text": "Book a Facility Tour"}
              ]
          }]);
      }
    </script>
</body>
</html>
