<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Arena | Arena Scout</title>
    <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
    
    <style>
        body, html {
            height: 100%; margin: 0; padding: 0;
            background: #000; overflow: hidden;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            font-family: 'Google Sans', sans-serif;
        }

        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=2070'); 
            background-position: center; background-size: cover;
            filter: blur(8px) brightness(35%); z-index: -1;
        }

        .header {
            text-align: center; color: white; margin-bottom: 20px; z-index: 1;
        }

        /* The Portal Frame - Darker to ensure visibility */
        .portal-frame {
            width: 360px;
            height: 520px;
            max-width: 90%; 
            background: rgba(30, 30, 30, 0.85); /* Dark semi-transparent background */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            overflow: hidden;
            z-index: 2;
        }

        df-messenger {
            width: 100%;
            height: 100%;
            --df-messenger-font-family: 'Google Sans';
            --df-messenger-font-color: #ffffff;
            --df-messenger-chat-background: transparent;
            --df-messenger-titlebar-background: #000000;
            
            /* TYPING FIX: Solid white background for the input so you can see black text */
            --df-messenger-input-background: #ffffff; 
            --df-messenger-input-font-color: #000000;
            --df-messenger-input-placeholder-font-color: #666666;
            
            /* BUBBLE FIX: Clear bot messages */
            --df-messenger-message-bot-background: #f1f3f4;
            --df-messenger-message-user-background: #1a73e8;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.5rem !important; }
            .portal-frame { height: 480px; }
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="header">
        <h1 style="margin:0; letter-spacing:4px; text-transform:uppercase; font-size: 1.8rem;">Northern Arena</h1>
        <p style="opacity:0.7; font-size: 0.8rem;">Your AI Fitness Concierge</p>
    </div>

    <div class="portal-frame">
        <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
        <df-messenger
          project-id="arena-scout-492406"
          agent-id="26a84805-4e47-4747-b321-abee73640543"
          language-code="en"
          max-query-length="-1"
          allow-unauthenticated="true">
          
          <df-messenger-chat-bubble
            chat-title="Arena Scout">
          </df-messenger-chat-bubble>
        </df-messenger>
    </div>

</body>
</html>
