<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Scout</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --sand:        #faf6f0;
            --ink:         #1a2331;
            --ink-soft:    rgba(255,255,255,0.85);
            --pool:        #2b8aab;
            --pool-deep:   #1a5d7a;
            --sunset:      #ff7a5c;
            --sunset-soft: #ffb89d;
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--ink);
            background: transparent;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .portal-frame {
            width: 100%;
            height: 100%;
            background: var(--sand);
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        .chat-head {
            background: var(--ink);
            color: #fff;
            padding: 16px 20px;
            font-weight: 600;
            font-size: 15px;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .chat-head-left {
            display: flex; align-items: center; gap: 10px;
        }
        .chat-head .av {
            width: 32px; height: 32px; border-radius: 50%;
            background: #fff;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.15);
        }
        .chat-head .av img {
            width: 24px;
            height: 24px;
            object-fit: contain;
            display: block;
            /* Logo is white originally — invert it so it shows dark on white circle */
            filter: brightness(0) saturate(100%) invert(13%) sepia(33%) saturate(728%) hue-rotate(177deg) brightness(94%) contrast(95%);
        }
        .chat-head .status {
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; font-weight: 500; opacity: 0.8;
        }
        .chat-head .dot {
            width: 6px; height: 6px; border-radius: 50%; background: #4ade80;
            box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.6);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.6); }
            70%  { box-shadow: 0 0 0 6px rgba(74, 222, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }

        .chat-msgs {
            flex: 1; overflow-y: auto;
            padding: 18px;
            display: flex; flex-direction: column; gap: 10px;
            background: var(--sand);
        }

        .msg {
            max-width: 82%; padding: 11px 14px;
            border-radius: 16px; font-size: 14px; line-height: 1.6;
            word-wrap: break-word;
            animation: pop 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes pop {
            from { opacity: 0; transform: translateY(6px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .msg.user {
            align-self: flex-end;
            background: var(--pool); color: #fff;
            border-bottom-right-radius: 5px;
            white-space: pre-wrap;
        }
        .msg.bot {
            align-self: flex-start;
            background: #fff; color: var(--ink);
            border: 1px solid rgba(26,35,49,0.08);
            border-bottom-left-radius: 5px;
        }
        .msg.bot a { color: var(--pool-deep); }

        /* Formatted bot message styles */
        .msg.bot p { margin: 0 0 8px 0; }
        .msg.bot p:last-child { margin-bottom: 0; }
        .msg.bot ul { margin: 6px 0; padding-left: 0; list-style: none; }
        .msg.bot ul li {
            padding: 5px 0 5px 0;
            border-bottom: 1px solid rgba(26,35,49,0.06);
            line-height: 1.5;
        }
        .msg.bot ul li:last-child { border-bottom: none; }
        .msg.bot .option-block {
            padding: 8px 0;
            border-bottom: 1px solid rgba(26,35,49,0.07);
        }
        .msg.bot .option-block:last-child { border-bottom: none; padding-bottom: 0; }
        .msg.bot .option-block:first-child { padding-top: 0; }
        .msg.bot .option-title {
            font-weight: 700;
            color: var(--pool-deep);
            display: block;
            margin-bottom: 2px;
        }
        .msg.bot .option-detail {
            font-size: 12.5px;
            color: rgba(26,35,49,0.65);
            display: block;
        }
        .msg.bot .section-label {
            font-weight: 700;
            display: block;
            margin-bottom: 6px;
            color: var(--ink);
        }

        /* Button chips */
        .btn-group {
            align-self: flex-start;
            display: flex; flex-wrap: wrap; gap: 8px;
            max-width: 100%;
            animation: pop 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .btn-chip {
            padding: 8px 14px;
            border: 1.5px solid var(--pool);
            border-radius: 20px;
            background: #fff;
            color: var(--pool);
            font-size: 13px; font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, transform 0.1s;
            white-space: nowrap;
        }
        .btn-chip:hover {
            background: var(--pool); color: #fff;
            transform: translateY(-1px);
        }
        .btn-chip:active { transform: translateY(0); }
        .btn-chip.used {
            opacity: 0.4; cursor: default; pointer-events: none;
        }

        /* Typing dots */
        .msg.typing { display: flex; gap: 4px; align-items: center; padding: 14px; }
        .msg.typing span {
            width: 7px; height: 7px; border-radius: 50%; background: var(--pool);
            animation: blink 1.4s infinite both;
        }
        .msg.typing span:nth-child(2) { animation-delay: 0.2s; }
        .msg.typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }

        .chat-input {
            display: flex; gap: 8px;
            padding: 12px; flex-shrink: 0;
            background: #fff;
            border-top: 1px solid rgba(26,35,49,0.08);
        }
        .chat-input input {
            flex: 1; padding: 11px 15px;
            border: 1px solid rgba(26,35,49,0.15);
            border-radius: 22px; font-size: 14px;
            font-family: inherit; outline: none; color: var(--ink);
            transition: border-color 0.2s;
        }
        .chat-input input:focus { border-color: var(--pool); }
        .chat-input button {
            padding: 0 20px; border: none;
            background: var(--pool); color: #fff;
            border-radius: 22px; cursor: pointer;
            font-size: 14px; font-weight: 600; font-family: inherit;
            transition: background 0.2s;
        }
        .chat-input button:hover { background: var(--pool-deep); }
        .chat-input button:disabled { opacity: 0.5; cursor: default; }
    </style>
</head>
<body>

    <div class="portal-frame">
        <div class="chat-head">
            <div class="chat-head-left">
                <span class="av"><img src="logo.png" alt="Northern Arena"></span>
                <span>Arena Scout</span>
            </div>
            <div class="status">
                <span class="dot"></span>
                <span>Online</span>
            </div>
        </div>
        <div class="chat-msgs" id="msgs"></div>
        <div class="chat-input">
            <input id="inp" type="text" placeholder="Type a message…" autocomplete="off"/>
            <button id="snd">Send</button>
        </div>
    </div>

    <script>
    (function () {
        var PROXY = "https://us-central1-arena-scout-492406.cloudfunctions.net/arena-scout-proxy";
        var userId = "web-" + Math.random().toString(36).slice(2, 10);
        var sessionId = "";

        var msgs = document.getElementById("msgs");
        var inp  = document.getElementById("inp");
        var snd  = document.getElementById("snd");

        function escapeHtml(s) {
            return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
        }

        function linkify(s) {
            return s.replace(/(https?:\/\/[^\s<]+)/g, function(url) {
                var clean = url.replace(/[.,!?]+$/, "");
                var trail = url.slice(clean.length);
                return '<a href="' + clean + '" target="_blank" rel="noopener">' + clean + '</a>' + trail;
            });
        }

        function formatBotText(raw) {
            var html = '';
            var lines = raw.split('\n');
            var i = 0;

            while (i < lines.length) {
                var line = lines[i].trim();
                if (!line) { i++; continue; }

                if (/^🔹/.test(line)) {
                    html += '<div class="option-block">';
                    html += '<span class="option-title">' + escapeHtml(line) + '</span>';
                    if (i+1 < lines.length && lines[i+1].trim() && !/^🔹/.test(lines[i+1].trim()) && !/^\*/.test(lines[i+1].trim()) && !/^-/.test(lines[i+1].trim())) {
                        i++;
                        html += '<span class="option-detail">' + escapeHtml(lines[i].trim()) + '</span>';
                    }
                    html += '</div>';
                    i++;
                    continue;
                }

                if (/^[\*\-] /.test(line)) {
                    html += '<ul>';
                    while (i < lines.length && /^[\*\-] /.test(lines[i].trim())) {
                        var item = lines[i].trim().replace(/^[\*\-] /, '');
                        item = item.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                        item = linkify(escapeHtml(item).replace(/&lt;strong&gt;/g,'<strong>').replace(/&lt;\/strong&gt;/g,'</strong>'));
                        html += '<li>' + item + '</li>';
                        i++;
                    }
                    html += '</ul>';
                    continue;
                }

                if (/:$/.test(line) && line.length < 80) {
                    html += '<span class="section-label">' + escapeHtml(line) + '</span>';
                    i++;
                    continue;
                }

                var para = escapeHtml(line).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                para = linkify(para);
                html += '<p>' + para + '</p>';
                i++;
            }

            return html;
        }

        function parseButtons(raw) {
            var btnRe = /\[\[BUTTONS\]\]([\s\S]*?)\[\[\/BUTTONS\]\]/g;
            var buttons = [];
            var text = raw.replace(btnRe, function(_, inner) {
                inner.split("\n").forEach(function(line) {
                    var l = line.trim();
                    if (l) buttons.push(l);
                });
                return "";
            }).trim();
            return { text: text, buttons: buttons };
        }

        function scrollBottom() {
            msgs.scrollTop = msgs.scrollHeight;
        }

        function addMsg(text, who) {
            var d = document.createElement("div");
            d.className = "msg " + who;
            if (who === "bot") {
                d.innerHTML = formatBotText(text);
            } else {
                d.textContent = text;
            }
            msgs.appendChild(d);
            scrollBottom();
            return d;
        }

        var URL_BUTTONS = {
            "Join the waitlist 🎉": "https://portal.iclasspro.com/northernarena/camps/5?sortBy=time",
            "Join online": "https://www.northernarena.co.nz/memberships",
            "Book a free tour": "https://grow-api.hapana.com/widget/booking/264OE6yoicHwWuApL1sw",
            "Book adult lessons": "https://portal.iclasspro.com/northernarena/classes?levels=36"
        };

        function addButtons(options) {
            var group = document.createElement("div");
            group.className = "btn-group";
            options.forEach(function(label) {
                var btn = document.createElement("button");
                btn.className = "btn-chip";
                btn.textContent = label;
                btn.addEventListener("click", function() {
                    if (URL_BUTTONS[label]) {
                        window.open(URL_BUTTONS[label], "_blank");
                        return;
                    }
                    group.querySelectorAll(".btn-chip").forEach(function(c) {
                        c.classList.add("used");
                    });
                    sendMessage(label);
                });
                group.appendChild(btn);
            });
            msgs.appendChild(group);
            scrollBottom();
            return group;
        }

        function addBotResponse(raw) {
            var parsed = parseButtons(raw);
            if (parsed.text) addMsg(parsed.text, "bot");
            if (parsed.buttons.length) addBotButtons(parsed.buttons);
        }

        var lastBtnGroup = null;
        function addBotButtons(options) {
            lastBtnGroup = addButtons(options);
        }

        function disableLastButtons() {
            if (lastBtnGroup) {
                lastBtnGroup.querySelectorAll(".btn-chip").forEach(function(c) {
                    c.classList.add("used");
                });
                lastBtnGroup = null;
            }
        }

        function sendMessage(text) {
            if (!text) return;
            disableLastButtons();
            addMsg(text, "user");
            inp.value = "";
            snd.disabled = true;

            var typing = document.createElement("div");
            typing.className = "msg bot typing";
            typing.innerHTML = "<span></span><span></span><span></span>";
            msgs.appendChild(typing);
            scrollBottom();

            fetch(PROXY, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text, user_id: userId, session_id: sessionId })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                typing.remove();
                if (data.session_id) sessionId = data.session_id;
                var response = data.response || data.error || "Sorry, something went wrong.";
                addBotResponse(response);
                snd.disabled = false;
                inp.focus();
            })
            .catch(function() {
                typing.remove();
                addMsg("Sorry, I couldn't connect. Please try again.", "bot");
                snd.disabled = false;
            });
        }

        // Initial greeting
        addBotResponse("Hi! I'm Arena Scout from Northern Arena. Can I help with Gym or Swim? 🇳🇿 🇨🇳 🇰🇷 🇮🇳 🇵🇭 🇧🇷 🇪🇸 Chat in your language!\n\n[[BUTTONS]]\n🏊 Swim school\n🏋️ Gym\n[[/BUTTONS]]");

        snd.onclick = function() { sendMessage(inp.value.trim()); };
        inp.addEventListener("keydown", function(e) { if (e.key === "Enter") sendMessage(inp.value.trim()); });
        inp.focus();
    })();
    </script>

</body>
</html>
