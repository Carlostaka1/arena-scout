<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Arena | Arena Scout</title>
    <style>
        body, html {
            height: 100%; margin: 0; padding: 0;
            font-family: 'Google Sans', Arial, sans-serif;
            background: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=2070'); 
            background-position: center; background-size: cover;
            filter: blur(10px) brightness(35%); z-index: -1; transform: scale(1.1);
        }
        .header-container {
            position: absolute; top: 10%; text-align: center; color: white; z-index: 1; width: 100%;
        }
        h1 { font-size: 3rem; margin: 0; text-transform: uppercase; letter-spacing: 3px; }
        
        df-messenger {
            --df-messenger-chat-window-height: 550px;
            --df-messenger-chat-window-width: 500px;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>
    <div class="header-container">
        <h1>Northern Arena</h1>
        <p>Your 24/7 fitness concierge is ready to assist.</p>
    </div>

    <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
    <df-messenger
      project-id="arena-scout-492406"
      agent-id="26a84805-4e47-4747-b321-abee73640543"
      language-code="en">
      <df-messenger-chat-bubble chat-title="Arena_Scout"></df-messenger-chat-bubble>
    </df-messenger>

    <script>
      const dfMessenger = document.querySelector('df-messenger');
      
      dfMessenger.addEventListener('df-messenger-loaded', () => {
          dfMessenger.expand(); 

          // THE NUCLEAR FIX: Reach into the Shadow DOM and move it repeatedly until it sticks
          const moveWidget = setInterval(() => {
              const shadowRoot = dfMessenger.shadowRoot;
              if (shadowRoot) {
                  // V1 uses either .df-messenger-wrapper or .chat-wrapper
                  const wrapper = shadowRoot.querySelector('.df-messenger-wrapper') || 
                                  shadowRoot.querySelector('.chat-wrapper');
                  
                  if (wrapper) {
                      wrapper.style.setProperty('position', 'fixed', 'important');
                      wrapper.style.setProperty('top', '55%', 'important');
                      wrapper.style.setProperty('left', '50%', 'important');
                      wrapper.style.setProperty('transform', 'translate(-50%, -50%)', 'important');
                      wrapper.style.setProperty('bottom', 'auto', 'important');
                      wrapper.style.setProperty('right', 'auto', 'important');
                      
                      // Once moved, we can stop the interval
                      clearInterval(moveWidget);
                  }
              }
          }, 100); 

          dfMessenger.renderCustomCard([{
              "type": "suggestion_chips",
              "suggestions": [
                {"text": "10 Days for $10 Trial"},
                {"text": "Student/Senior Rates"},
                {"text": "Book a Facility Tour"}
              ]
          }]);
      });
    </script>
</body>
</html>
