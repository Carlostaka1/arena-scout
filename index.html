<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Arena | Arena Scout</title>
    <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
    <style>
        body, html {
            height: 100%; margin: 0; padding: 0;
            background: #000; overflow: hidden;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            font-family: 'Google Sans', sans-serif;
        }

        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=2070'); 
            background-position: center; background-size: cover;
            filter: blur(10px) brightness(30%); z-index: -1;
        }

        .header {
            text-align: center; color: white; margin-bottom: 25px; z-index: 1;
        }

        /* The Portal Frame */
        .portal-frame {
            width: 480px;
            height: 600px;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            overflow: hidden;
            z-index: 2;
            position: relative;
        }

        /* Google's Custom Styles */
        df-messenger {
            width: 100%;
            height: 100%;
            --df-messenger-font-color: #000;
            --df-messenger-font-family: 'Google Sans';
            --df-messenger-chat-background: #f3f6fc;
            --df-messenger-message-user-background: #d3e3fd;
            --df-messenger-message-bot-background: #fff;
        }

        /* Hide the default bubble */
        df-messenger::part(button) { display: none !important; }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="header">
        <h1 style="margin:0; letter-spacing:4px; text-transform:uppercase; font-size: 2.2rem;">Northern Arena</h1>
        <p style="opacity:0.7;">Your AI Fitness Concierge is ready.</p>
    </div>

    <div class="portal-frame">
        <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
        <df-messenger
          project-id="arena-scout-492406"
          agent-id="26a84805-4e47-4747-b321-abee73640543"
          language-code="en"
          max-query-length="-1"
          expand="true"> <df-messenger-chat-bubble chat-title="Arena Scout"></df-messenger-chat-bubble>
        </df-messenger>
    </div>

</body>
</html>
