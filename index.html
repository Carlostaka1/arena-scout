<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Arena | Arena Scout</title>
    <style>
        body, html {
            height: 100%; margin: 0; padding: 0;
            background: #000; overflow: hidden;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            font-family: 'Google Sans', sans-serif;
        }

        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=2070'); 
            background-position: center; background-size: cover;
            filter: blur(8px) brightness(30%); z-index: -1;
        }

        .header {
            text-align: center; color: white; margin-bottom: 30px; z-index: 1;
        }

        /* 1. This creates the "Frame" Justin will see */
        .scout-portal {
            width: 450px;
            height: 600px;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            z-index: 2;
            position: relative;
        }

        /* 2. This forces the Dialogflow Widget to sit inside that frame */
        df-messenger {
            position: absolute;
            inset: 0;
            --df-messenger-chat-window-height: 100%;
            --df-messenger-chat-window-width: 100%;
            --df-messenger-button-titlebar-color: #004d99;
        }

        /* 3. Hide the floating button bubble */
        df-messenger::part(button) {
            display: none !important;
        }

        /* 4. Fix the internal container so it doesn't float away */
        df-messenger::part(chat-wrapper) {
            position: static !important;
            height: 100% !important;
            width: 100% !important;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="header">
        <h1 style="margin:0; letter-spacing:4px; text-transform:uppercase; font-size: 2.2rem;">Northern Arena</h1>
        <p style="opacity:0.7;">The Arena Scout is ready to assist.</p>
    </div>

    <div class="scout-portal">
        <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
        <df-messenger
          location="us-central1"
          project-id="arena-scout-492406"
          agent-id="26a84805-4e47-4747-b321-abee73640543"
          language-code="en"
          expand="true"> <df-messenger-chat-bubble chat-title="Arena Scout"></df-messenger-chat-bubble>
        </df-messenger>
    </div>

</body>
</html>
