<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Arena | Arena Scout</title>
    <style>
        body, html {
            height: 100%; margin: 0; padding: 0;
            background: #000; overflow: hidden;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            font-family: 'Google Sans', sans-serif;
        }

        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=2070'); 
            background-position: center; background-size: cover;
            filter: blur(8px) brightness(30%); z-index: -1;
        }

        .header {
            text-align: center; color: white; margin-bottom: 20px; z-index: 1;
        }

        /* THE BOX: This is the container for the AI */
        .portal-frame {
            width: 450px;
            height: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden; /* Clips the AI to the rounded corners */
            z-index: 2;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 500px) {
            .portal-frame { width: 95vw; height: 75vh; }
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="header">
        <h1 style="margin:0; letter-spacing:3px; text-transform:uppercase;">Northern Arena</h1>
        <p style="opacity:0.7;">Your Arena Scout is online.</p>
    </div>

    <div class="portal-frame">
        <iframe
            allow="microphone;"
            src="https://console.dialogflow.com/api-client/demo/embedded/26a84805-4e47-4747-b321-abee73640543">
        </iframe>
    </div>

</body>
</html>
