<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Arena | Arena Scout</title>
    <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
    
    <style>
        body, html {
            height: 100%; margin: 0; padding: 0;
            background: #000; overflow: hidden;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            font-family: 'Google Sans', sans-serif;
        }

        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=2070'); 
            background-position: center; background-size: cover;
            filter: blur(8px) brightness(40%); z-index: -1;
        }

        .header {
            text-align: center; color: white; margin-bottom: 20px; z-index: 1;
        }

        /* The Portal Frame - Now smaller and glass-like */
        .portal-frame {
            width: 400px; /* Reduced from 480px */
            height: 550px; /* Reduced from 600px */
            max-width: 90%; 
            max-height: 70vh;
            /* Semi-transparent background */
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(15px); /* This creates the frosted glass effect */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            z-index: 2;
        }

        /* Customizing the Agent for transparency */
        df-messenger {
            width: 100%;
            height: 100%;
            --df-messenger-font-family: 'Google Sans';
            --df-messenger-font-color: #ffffff; /* White text for better contrast on glass */
            /* Making the chat area transparent */
            --df-messenger-chat-background: rgba(0, 0, 0, 0.3); 
            --df-messenger-message-bot-background: rgba(255, 255, 255, 0.9);
            --df-messenger-message-user-background: #007bff;
            --df-messenger-titlebar-background: rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.4rem !important; }
            .portal-frame { height: 500px; width: 95%; }
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="header">
        <h1 style="margin:0; letter-spacing:4px; text-transform:uppercase; font-size: 2rem;">Northern Arena</h1>
        <p style="opacity:0.8; font-size: 0.9rem;">Your AI Fitness Concierge</p>
    </div>

    <div class="portal-frame">
        <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
        <df-messenger
          project-id="arena-scout-492406"
          agent-id="26a84805-4e47-4747-b321-abee73640543"
          language-code="en"
          max-query-length="-1"
          allow-unauthenticated="true">
          
          <df-messenger-chat 
            chat-title="Arena Scout"
            intent="WELCOME">
          </df-messenger-chat>
          
        </df-messenger>
    </div>

</body>
</html>
