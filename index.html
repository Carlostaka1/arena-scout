<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Arena | Arena Scout</title>
    <style>
        body, html {
            height: 100%; margin: 0; padding: 0;
            font-family: 'Google Sans', Arial, sans-serif;
            background: #000; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=2070'); 
            background-position: center; background-size: cover;
            filter: blur(8px) brightness(30%); z-index: -1; transform: scale(1.1);
        }

        .header-container {
            text-align: center; color: white; z-index: 1; margin-bottom: 30px;
        }

        h1 { font-size: 2.8rem; text-transform: uppercase; letter-spacing: 5px; margin: 0; font-weight: 800; }
        p { opacity: 0.7; font-size: 1.1rem; letter-spacing: 1px; margin-top: 10px; }

        /* THE PORTAL CARD */
        #chat-card {
            width: 480px;
            height: 580px;
            background: rgba(255, 255, 255, 0.95); /* Slight transparency */
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* The Custom 'Start' Button - Premium Styling */
        #start-btn {
            padding: 18px 40px;
            font-size: 1.1rem;
            background: #004d99; /* Northern Arena Blue */
            color: white;
            border: none;
            border-radius: 50px; /* Pill shape looks more modern */
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 77, 153, 0.3);
        }

        #start-btn:hover { 
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(0, 77, 153, 0.4);
            background: #0056b3;
        }

        /* Inner Messenger UI */
        df-messenger {
            --df-messenger-chat-window-height: 580px;
            --df-messenger-chat-window-width: 480px;
            --df-messenger-button-titlebar-color: #004d99;
            --df-messenger-font-family: 'Google Sans';
            display: none; 
        }

        @media screen and (max-width: 600px) {
            #chat-card { width: 92vw; height: 75vh; border-radius: 16px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="header-container">
        <h1>Northern Arena</h1>
        <p>Your AI-Powered Fitness Concierge</p>
    </div>

    <div id="chat-card">
        <button id="start-btn" onclick="openScout()">Launch Arena Scout</button>
        
        <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
        <df-messenger
          project-id="arena-scout-492406"
          agent-id="26a84805-4e47-4747-b321-abee73640543"
          language-code="en">
          <df-messenger-chat-bubble chat-title="Arena Scout"></df-messenger-chat-bubble>
        </df-messenger>
    </div>

    <script>
      function openScout() {
          const dfMessenger = document.querySelector('df-messenger');
          const btn = document.getElementById('start-btn');
          
          dfMessenger.style.display = 'block';
          btn.style.display = 'none';

          // Small delay ensures the display:block has time to register before expanding
          setTimeout(() => {
              dfMessenger.expand();
          }, 100);

          dfMessenger.renderCustomCard([{
              "type": "suggestion_chips",
              "suggestions": [
                {"text": "10 Days for $10 Trial"},
                {"text": "Student/Senior Rates"},
                {"text": "Book a Facility Tour"}
              ]
          }]);
      }
    </script>
</body>
</html>
