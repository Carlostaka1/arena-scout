<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Arena | Arena Scout</title>
    <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
    
    <style>
        body, html {
            height: 100%; margin: 0; padding: 0;
            background: #000; overflow: hidden;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            font-family: 'Google Sans', sans-serif;
        }

        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=2070'); 
            background-position: center; background-size: cover;
            filter: blur(8px) brightness(35%); z-index: -1;
        }

        .header {
            text-align: center; color: white; margin-bottom: 20px; z-index: 1;
        }

        .portal-frame {
            width: 360px;
            height: 520px;
            max-width: 90%; 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            overflow: hidden;
            z-index: 2;
        }

        /* 2026 GOOGLE CSS VARIABLE FIXES */
        df-messenger {
            --df-messenger-font-family: 'Google Sans';
            
            /* The Chat Window */
            --df-messenger-chat-background: rgba(0, 0, 0, 0); 
            --df-messenger-titlebar-background: rgba(0, 0, 0, 0.6);
            --df-messenger-font-color: #ffffff;

            /* THE TYPING BOX (The fix you need) */
            --df-messenger-input-background: #1a1a1a; /* Solid dark grey so you can see text */
            --df-messenger-input-font-color: #ffffff; /* Brilliant white text */
            --df-messenger-input-placeholder-font-color: #888888;
            --df-messenger-send-icon: #ffffff;

            /* Message Bubbles */
            --df-messenger-message-bot-background: rgba(255, 255, 255, 0.2);
            --df-messenger-message-user-background: #007bff;
        }

        /* Reaching inside the Shadow DOM to kill the black background */
        df-messenger::part(chat-window) {
            background-color: transparent !important;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.5rem !important; }
            .portal-frame { height: 480px; }
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="header">
        <h1 style="margin:0; letter-spacing:4px; text-transform:uppercase; font-size: 1.8rem;">Northern Arena</h1>
        <p style="opacity:0.7; font-size: 0.8rem;">Your AI Fitness Concierge</p>
    </div>

    <div class="portal-frame">
        <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></
