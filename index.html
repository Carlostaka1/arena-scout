<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Arena | Arena Scout</title>
    
    <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
    
    <style>
        /* 1. Background Setup */
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Google Sans', Arial, sans-serif;
            background: #000;
            display: flex;
            justify-content: center; 
            align-items: center;     
            overflow: hidden;
        }

        .bg-image {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=2070'); 
            background-position: center;
            background-size: cover;
            filter: blur(10px) brightness(35%); 
            z-index: -1;
            transform: scale(1.1);
        }

        /* 2. THE CENTER FORCE: Overriding the V1 Widget Positioning */
        df-messenger {
            z-index: 9999 !important;
            position: fixed !important;
            
            /* Force to Center */
            top: 55% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            
            /* Kill the corner positioning */
            bottom: auto !important;
            right: auto !important;

            /* Set the Portal Size */
            --df-messenger-chat-window-height: 550px;
            --df-messenger-chat-window-width: 500px;
            
            /* Theme colors */
            --df-messenger-font-color: #000;
            --df-messenger-chat-background: #f3f6fc;
            --df-messenger-message-user-background: #d3e3fd;
            --df-messenger-message-bot-background: #fff;
            --df-messenger-button-titlebar-color: #004d99;
        }

        /* 3. Header Text */
        .header-container {
            position: absolute;
            top: 10%;
            text-align: center;
            color: white;
            z-index: 1;
            width: 100%;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-top: 10px;
        }

        /* Mobile Fix: Full Screen */
        @media screen and (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            df-messenger {
                top: 50% !important;
                --df-messenger-chat-window-width: 95vw;
                --df-messenger-chat-window-height: 75vh;
            }
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="header-container">
        <h1>Northern Arena</h1>
        <p>Your 24/7 fitness concierge is ready to assist.</p>
    </div>

    <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
    <df-messenger
      project-id="arena-scout-492406"
      agent-id="26a84805-4e47-4747-b321-abee73640543"
      language-code="en"
      max-query-length="-1"
      allow-feedback="all">
      <df-messenger-chat-bubble
        chat-title="Arena_Scout">
      </df-messenger-chat-bubble>
    </df-messenger>

    <script>
      // 5. Force the expansion and buttons immediately
      const dfMessenger = document.querySelector('df-messenger');
      
      dfMessenger.addEventListener('df-messenger-loaded', () => {
          // Trigger the open state
          dfMessenger.expand(); 
          
          // Render the Suggestion Chips
          dfMessenger.renderCustomCard([
            {
              "type": "suggestion_chips",
              "suggestions": [
                {"text": "10 Days for $10 Trial"},
                {"text": "Student/Senior Rates"},
                {"text": "Book a Facility Tour"}
              ]
            }
          ]);
      });
    </script>

</body>
</html>
