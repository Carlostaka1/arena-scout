<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Arena | Arena Scout</title>
    <style>
        body, html {
            height: 100%; margin: 0; padding: 0;
            background: #000; overflow: hidden;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            font-family: 'Google Sans', Arial, sans-serif;
        }

        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=2070'); 
            background-position: center; background-size: cover;
            filter: blur(10px) brightness(30%); z-index: -1;
        }

        .header {
            text-align: center; color: white; margin-bottom: 20px; z-index: 1;
        }

        /* THE PORTAL: This creates the professional 'App' look */
        .scout-container {
            width: 450px;
            height: 600px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            overflow: hidden;
            z-index: 2;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* The iframe forces the bot to stay exactly where we want it */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 500px) {
            .scout-container { width: 95vw; height: 75vh; }
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="header">
        <h1 style="margin:0; letter-spacing:4px; text-transform:uppercase; font-size: 2rem;">Northern Arena</h1>
        <p style="opacity:0.7;">The Arena Scout is ready to assist you.</p>
    </div>

    <div class="scout-container">
        <iframe
            src="https://dialogflow.cloud.google.com/cx/explore/projects/arena-scout-492406/locations/us-central1/agents/26a84805-4e47-4747-b321-abee73640543?isEmbedded=true">
        </iframe>
    </div>

</body>
</html>
