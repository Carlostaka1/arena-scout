<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northern Arena | Arena Scout</title>
    <style>
        /* 1. Background & Layout */
        body, html {
            height: 100%; margin: 0; padding: 0;
            font-family: 'Google Sans', Arial, sans-serif;
            background: #000; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=2070'); 
            background-position: center; background-size: cover;
            filter: blur(10px) brightness(35%); z-index: -1; transform: scale(1.1);
        }

        .header-container {
            margin-top: 5vh; text-align: center; color: white; z-index: 1;
        }

        h1 { font-size: 2.5rem; margin: 0; text-transform: uppercase; letter-spacing: 3px; }
        p { opacity: 0.8; margin-top: 5px; }

        /* 2. THE PORTAL: Centering the chat as a solid block */
        .chat-container {
            margin-top: 30px;
            width: 500px;
            height: 600px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 2;
        }

        /* Styling the internal Messenger to fill the container */
        df-messenger {
            --df-messenger-chat-window-height: 100%;
            --df-messenger-chat-window-width: 100%;
            --df-messenger-button-titlebar-color: #004d99;
        }

        /* Mobile Fix */
        @media screen and (max-width: 600px) {
            .header-container h1 { font-size: 1.8rem; }
            .chat-container { width: 95vw; height: 75vh; margin-top: 15px; }
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="header-container">
        <h1>Northern Arena</h1>
        <p>The Arena Scout is ready to assist.</p>
    </div>

    <div class="chat-container">
        <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
        <df-messenger
          project-id="arena-scout-492406"
          agent-id="26a84805-4e47-4747-b321-abee73640543"
          language-code="en"
          wait-open="true">
          <df-messenger-chat-bubble chat-title="Arena_Scout"></df-messenger-chat-bubble>
        </df-messenger>
    </div>

    <script>
      const dfMessenger = document.querySelector('df-messenger');
      dfMessenger.addEventListener('df-messenger-loaded', () => {
          dfMessenger.expand(); 
          
          dfMessenger.renderCustomCard([{
              "type": "suggestion_chips",
              "suggestions": [
                {"text": "10 Days for $10 Trial"},
                {"text": "Student/Senior Rates"},
                {"text": "Book a Facility Tour"}
              ]
          }]);
      });
    </script>
</body>
</html>
